<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Myraa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#05080f;
    --bg-mid:#0a1220;
    --bg-panel:rgba(13,23,38,0.78);
    --bg-panel-strong:rgba(18,32,52,0.92);
    --cyan:#4fd8ff;
    --cyan-dim:rgba(79,216,255,0.32);
    --cyan-faint:rgba(79,216,255,0.14);
    --blue:#3b82f6;
    --text-primary:#dceaf9;
    --text-muted:#5d7693;
    --line:rgba(79,216,255,0.2);
    --good:#4fffb0;
    --warn:#ff8989;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:radial-gradient(70% 45% at 50% 0%, var(--bg-mid) 0%, var(--bg-deep) 65%);
    color:var(--text-primary);
    font-family:'Manrope',sans-serif;
    display:flex;justify-content:center;
    overflow:hidden;
  }
  #app{
    width:100%;max-width:480px;
    height:100vh;height:100dvh;
    display:flex;flex-direction:column;
    position:relative;
  }

  .topbar{
    flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
    padding:16px 16px 0;
  }
  .ghost-btn{
    width:36px;height:36px;border-radius:8px;
    border:1px solid var(--line);background:var(--bg-panel);color:var(--cyan);
    font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;
  }
  .title-block{ text-align:center; }
  .eyebrow{ font-family:'Orbitron',sans-serif; font-size:9.5px; letter-spacing:2.5px; color:var(--text-muted); }
  .name{
    font-family:'Orbitron',sans-serif; font-weight:700;
    font-size:clamp(19px,5.5vw,22px); letter-spacing:3px;
    color:var(--text-primary); text-shadow:0 0 18px var(--cyan-dim);
  }
  .status-dot{
    display:flex;align-items:center;gap:5px;
    font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:1.5px;color:var(--good);
  }
  .status-dot .dot{
    width:6px;height:6px;border-radius:50%;background:var(--good);
    box-shadow:0 0 8px var(--good); animation:blink 2s ease-in-out infinite;
  }
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.4;}}

  .avatar-stage{
    width:clamp(160px,42vw,200px);height:clamp(160px,42vw,200px);
    margin:14px auto 8px; position:relative;
    display:flex;align-items:center;justify-content:center;
  }
  .ring-outer{
    position:absolute;inset:-4px;border-radius:50%;
    border:1px solid var(--cyan-dim); animation:spin 16s linear infinite;
  }
  .ring-outer::before{
    content:'';position:absolute;inset:7px;border-radius:50%;
    border:1px dashed rgba(79,216,255,0.22);
  }
  .ring-inner{
    position:absolute;inset:18px;border-radius:50%;
    border:1px dashed rgba(79,216,255,0.4); animation:spin 9s linear infinite reverse;
  }
  .orb-ring{ position:absolute;inset:30px;border-radius:50%;border:1.5px solid var(--cyan-dim); opacity:0.6; }
  .orb.thinking .orb-ring, .orb.hearing .orb-ring{ opacity:1; border-color:var(--cyan); }
  .orb{ position:absolute; inset:34px; }
  .orb-core{
    width:100%;height:100%;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #b9f3ff 0%, var(--cyan) 45%, #15366b 100%);
    box-shadow:0 0 46px 6px var(--cyan-dim), 0 0 90px 20px rgba(79,216,255,0.14);
    animation:breathe 4.2s ease-in-out infinite;
  }
  .orb.thinking .orb-core{
    animation:thinkPulse 1.05s ease-in-out infinite;
    box-shadow:0 0 55px 10px rgba(79,216,255,0.45), 0 0 100px 24px rgba(79,216,255,0.2);
  }
  .orb.talking .orb-core{ animation:breathe 1.1s ease-in-out infinite; }
  .waveform{
    position:absolute;bottom:14%;left:50%;transform:translateX(-50%);
    display:flex;gap:4px;align-items:flex-end;height:20px;
    opacity:0; transition:opacity 0.25s ease;
  }
  .orb.talking .waveform{ opacity:1; }
  .waveform span{ width:3.5px;border-radius:3px;background:rgba(8,16,28,0.85);height:6px; animation:bar 0.7s ease-in-out infinite; }
  .waveform span:nth-child(1){animation-delay:0s;}
  .waveform span:nth-child(2){animation-delay:0.12s;}
  .waveform span:nth-child(3){animation-delay:0.24s;}
  .waveform span:nth-child(4){animation-delay:0.12s;}
  .waveform span:nth-child(5){animation-delay:0s;}

  @keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.045);}}
  @keyframes thinkPulse{0%,100%{transform:scale(0.94);}50%{transform:scale(1.06);}}
  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
  @keyframes bar{0%,100%{height:6px;}50%{height:20px;}}

  .tactical-bar{
    margin:6px auto 4px; width:fit-content;
    font-family:'Orbitron',sans-serif; font-size:10.5px; letter-spacing:3px; color:var(--cyan);
    padding:5px 20px; border-top:1px solid var(--line); border-bottom:1px solid var(--line);
    text-align:center;
  }

  main{
    flex:1; overflow-y:auto; padding:10px 16px 12px;
    display:flex; flex-direction:column; gap:10px; scrollbar-width:none;
  }
  main::-webkit-scrollbar{display:none;}

  .bubble{
    max-width:78%; padding:10px 14px; border-radius:10px;
    font-size:14.5px; line-height:1.5; animation:fadeIn 0.25s ease;
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
  .bubble.her{
    align-self:flex-start; background:var(--bg-panel);
    border:1px solid var(--line); border-left:2px solid var(--cyan); color:var(--text-primary);
  }
  .bubble.me{
    align-self:flex-end;
    background:linear-gradient(135deg, rgba(79,216,255,0.16), rgba(59,130,246,0.16));
    border:1px solid var(--line); border-right:2px solid var(--blue);
  }
  .typing{
    align-self:flex-start; display:flex; gap:4px; padding:12px 14px;
    background:var(--bg-panel); border:1px solid var(--line); border-left:2px solid var(--cyan); border-radius:10px;
  }
  .typing span{ width:6px;height:6px;border-radius:50%;background:var(--cyan); animation:bar 0.9s ease-in-out infinite; }
  .typing span:nth-child(2){animation-delay:0.15s;}
  .typing span:nth-child(3){animation-delay:0.3s;}

  footer{
    flex-shrink:0; display:flex; align-items:center; gap:8px;
    padding:10px 14px calc(14px + env(safe-area-inset-bottom));
    border-top:1px solid var(--line); background:rgba(255,255,255,0.02);
  }
  .icon-btn{
    flex-shrink:0;width:42px;height:42px;border-radius:10px;
    border:1px solid var(--line);background:var(--bg-panel);color:var(--cyan);
    font-size:17px;display:flex;align-items:center;justify-content:center;
    cursor:pointer; transition:background 0.2s, transform 0.15s;
  }
  .icon-btn:active{transform:scale(0.92);}
  .icon-btn.active{ background:var(--cyan); color:#06121f; box-shadow:0 0 16px var(--cyan-dim); }
  .icon-btn:disabled{opacity:0.3;cursor:not-allowed;}

  #textInput{
    flex:1; background:var(--bg-panel-strong); border:1px solid var(--line); border-radius:10px;
    padding:11px 16px; color:var(--text-primary); font-family:'Manrope',sans-serif; font-size:14.5px; outline:none;
  }
  #textInput::placeholder{color:var(--text-muted);}
  #sendBtn{ background:linear-gradient(135deg, var(--cyan), var(--blue)); color:#06121f; border:none; }

  .drawer-overlay{
    position:fixed;inset:0; background:rgba(2,5,10,0.6); backdrop-filter:blur(2px);
    opacity:0;pointer-events:none; transition:opacity 0.25s ease; z-index:10;
  }
  .drawer-overlay.open{ opacity:1; pointer-events:auto; }
  .drawer{
    position:fixed;top:0;left:0;bottom:0; width:min(82vw,320px);
    background:linear-gradient(180deg, var(--bg-mid), var(--bg-deep));
    border-right:1px solid var(--line); transform:translateX(-100%);
    transition:transform 0.3s ease; z-index:11; padding:20px 16px; overflow-y:auto;
  }
  .drawer.open{ transform:translateX(0); }
  .drawer-header{
    display:flex;justify-content:space-between;align-items:center;
    font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:2px;color:var(--text-muted);
    margin-bottom:18px;
  }
  .drawer-header button{ background:none;border:none;color:var(--cyan);font-size:16px;cursor:pointer; }

  .hud-panel{ position:relative; border:1px solid var(--line); background:var(--bg-panel); padding:14px; margin-bottom:16px; }
  .hud-panel::before, .hud-panel::after{ content:'';position:absolute;width:10px;height:10px;border-color:var(--cyan); }
  .hud-panel::before{ top:-1px;left:-1px;border-top:2px solid;border-left:2px solid; }
  .hud-panel::after{ bottom:-1px;right:-1px;border-bottom:2px solid;border-right:2px solid; }

  .panel-title{ font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;color:var(--cyan);margin-bottom:10px; }
  .panel-row{
    display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;
    border-bottom:1px dashed rgba(79,216,255,0.12); color:var(--text-muted);
  }
  .panel-row span:last-child{ color:var(--text-primary); font-weight:600; }
  .panel-row:last-child{ border-bottom:none; }

  .trait-list{ margin:0;padding-left:18px;font-size:12.5px;color:var(--text-primary);line-height:1.9; }

  .memory-list{ margin:0; padding-left:18px; font-size:12px; color:var(--text-primary); line-height:1.8; max-height:180px; overflow-y:auto; }
  .memory-empty{ font-size:12px; color:var(--text-muted); font-style:italic; }
  .clear-btn{
    margin-top:10px; width:100%; padding:8px; background:transparent;
    border:1px solid var(--warn); color:var(--warn); border-radius:6px;
    font-family:'Manrope',sans-serif; font-size:11.5px; letter-spacing:0.5px; cursor:pointer;
  }

  .id-number{ font-family:'Orbitron',sans-serif;font-size:13px;letter-spacing:1.5px;color:var(--text-primary);margin-bottom:10px; }
  .barcode{
    height:28px;
    background:repeating-linear-gradient(90deg,
      var(--cyan) 0 2px, transparent 2px 5px, var(--cyan) 5px 7px, transparent 7px 9px,
      var(--cyan) 9px 13px, transparent 13px 16px, var(--cyan) 16px 17px, transparent 17px 21px,
      var(--cyan) 21px 24px, transparent 24px 26px);
    opacity:0.75;
  }
  .quote{ font-style:italic;font-size:12.5px;color:var(--text-muted);border-left:2px solid var(--cyan);padding-left:10px;margin-top:4px; }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <button class="ghost-btn" id="menuBtn">☰</button>
    <div class="title-block">
      <div class="eyebrow">AI COMPANION · LIVE</div>
      <div class="name">MYRAA</div>
    </div>
    <div class="status-dot"><span class="dot"></span>ACTIVE</div>
  </div>

  <div class="avatar-stage">
    <div class="ring-outer"></div>
    <div class="ring-inner"></div>
    <div class="orb idle" id="orb">
      <div class="orb-ring"></div>
      <div class="orb-core"></div>
      <div class="waveform"><span></span><span></span><span></span><span></span><span></span></div>
    </div>
  </div>
  <div class="tactical-bar" id="status">LISTENING.</div>

  <main id="chat"></main>

  <footer>
    <button class="icon-btn" id="muteBtn" title="Toggle voice">🔊</button>
    <button class="icon-btn" id="micBtn" title="Talk">🎤</button>
    <input id="textInput" type="text" placeholder="Say something..." autocomplete="off">
    <button class="icon-btn" id="sendBtn" title="Send">➤</button>
  </footer>

  <div class="drawer-overlay" id="drawerOverlay"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      COMPANION PROFILE
      <button id="closeDrawer">✕</button>
    </div>

    <div class="hud-panel">
      <div class="panel-title">STATUS</div>
      <div class="panel-row"><span>STATE</span><span id="drawerState">LISTENING</span></div>
      <div class="panel-row"><span>MODE</span><span>VOICE + TEXT</span></div>
      <div class="panel-row"><span>CONNECTION</span><span>LIVE</span></div>
    </div>

    <div class="hud-panel">
      <div class="panel-title">WHAT I REMEMBER</div>
      <ul class="memory-list" id="memoryList"></ul>
      <div class="memory-empty" id="memoryEmpty">Nothing yet — keep talking to me.</div>
      <button class="clear-btn" id="clearMemoryBtn">CLEAR MEMORY</button>
    </div>

    <div class="hud-panel">
      <div class="panel-title">COMPANION ID</div>
      <div class="id-number">MYR-0619-LIVE</div>
      <div class="barcode"></div>
    </div>

    <div class="quote">"I'm not here to manage your tasks. I'm here to listen."</div>
  </div>
</div>

<script>
const chatEl = document.getElementById('chat');
const orb = document.getElementById('orb');
const statusEl = document.getElementById('status');
const drawerStateEl = document.getElementById('drawerState');
const textInput = document.getElementById('textInput');
const sendBtn = document.getElementById('sendBtn');
const micBtn = document.getElementById('micBtn');
const muteBtn = document.getElementById('muteBtn');
const menuBtn = document.getElementById('menuBtn');
const closeDrawer = document.getElementById('closeDrawer');
const drawer = document.getElementById('drawer');
const drawerOverlay = document.getElementById('drawerOverlay');
const memoryListEl = document.getElementById('memoryList');
const memoryEmptyEl = document.getElementById('memoryEmpty');
const clearMemoryBtn = document.getElementById('clearMemoryBtn');

const HISTORY_KEY = 'myraa_history';
const MEMORY_KEY = 'myraa_memories';

let voiceOn = true;
let history = loadJSON(HISTORY_KEY, []);
let memories = loadJSON(MEMORY_KEY, []);

const STATE_LABELS = { idle:'LISTENING.', thinking:'ANALYZING.', talking:'RESPONDING.', hearing:'HEARING YOU...' };

function loadJSON(key, fallback){
  try{
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  }catch(e){ return fallback; }
}
function saveHistory(){ localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); }
function saveMemories(){ localStorage.setItem(MEMORY_KEY, JSON.stringify(memories)); }

function renderMemoryDrawer(){
  memoryListEl.innerHTML = '';
  if(memories.length === 0){
    memoryEmptyEl.style.display = 'block';
  }else{
    memoryEmptyEl.style.display = 'none';
    memories.forEach(m => {
      const li = document.createElement('li');
      li.textContent = m;
      memoryListEl.appendChild(li);
    });
  }
}

function addBubble(text, who){
  const b = document.createElement('div');
  b.className = 'bubble ' + (who === 'me' ? 'me' : 'her');
  b.textContent = text;
  chatEl.appendChild(b);
  chatEl.scrollTop = chatEl.scrollHeight;
  return b;
}

function showTyping(){
  const t = document.createElement('div');
  t.className = 'typing'; t.id = 'typingIndicator';
  t.innerHTML = '<span></span><span></span><span></span>';
  chatEl.appendChild(t);
  chatEl.scrollTop = chatEl.scrollHeight;
}
function hideTyping(){ const t = document.getElementById('typingIndicator'); if(t) t.remove(); }

function setOrbState(state){
  orb.className = 'orb ' + state;
  const label = STATE_LABELS[state] || state.toUpperCase();
  statusEl.textContent = label;
  drawerStateEl.textContent = label.replace('.','').replace('...','').toUpperCase();
}

function mergeMemories(newOnes){
  if(!newOnes || !newOnes.length) return;
  newOnes.forEach(fact => {
    const exists = memories.some(m => m.toLowerCase() === fact.toLowerCase());
    if(!exists) memories.push(fact);
  });
  if(memories.length > 40) memories = memories.slice(memories.length - 40);
  saveMemories();
  renderMemoryDrawer();
}

async function getReply(userText){
  history.push({role:'user', content: userText});
  saveHistory();
  setOrbState('thinking');
  showTyping();

  try{
    const recent = history.slice(-16);
    const res = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ messages: recent, memories })
    });
    const data = await res.json();
    hideTyping();

    if(!res.ok){
      addBubble("Hmm, something's off on my end: " + (data.error || 'unknown error'), 'her');
      setOrbState('idle');
      return;
    }

    const reply = data.reply || "Sorry, I lost my train of thought for a second.";
    history.push({role:'assistant', content: reply});
    saveHistory();
    addBubble(reply, 'her');
    mergeMemories(data.newMemories);
    speak(reply);
  }catch(err){
    hideTyping();
    setOrbState('idle');
    addBubble("Hmm, I couldn't reach the server. Check your connection and try again.", 'her');
  }
}

function speak(text){
  if(!voiceOn || !('speechSynthesis' in window)){ setOrbState('idle'); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.pitch = 1.25; u.rate = 0.97;
  const pickVoice = () => {
    const voices = window.speechSynthesis.getVoices();
    const female = voices.find(v => /female|samantha|victoria|zira|woman/i.test(v.name));
    if(female) u.voice = female;
  };
  pickVoice();
  if(window.speechSynthesis.getVoices().length === 0){ window.speechSynthesis.onvoiceschanged = pickVoice; }
  u.onstart = () => setOrbState('talking');
  u.onend = () => setOrbState('idle');
  u.onerror = () => setOrbState('idle');
  window.speechSynthesis.speak(u);
}

function handleSend(){
  const text = textInput.value.trim();
  if(!text) return;
  addBubble(text, 'me');
  textInput.value = '';
  getReply(text);
}

sendBtn.addEventListener('click', handleSend);
textInput.addEventListener('keydown', e => { if(e.key === 'Enter') handleSend(); });

muteBtn.addEventListener('click', () => {
  voiceOn = !voiceOn;
  muteBtn.textContent = voiceOn ? '🔊' : '🔇';
  muteBtn.classList.toggle('active', !voiceOn);
  if(!voiceOn) window.speechSynthesis.cancel();
});

menuBtn.addEventListener('click', () => { drawer.classList.add('open'); drawerOverlay.classList.add('open'); });
function closeDrawerFn(){ drawer.classList.remove('open'); drawerOverlay.classList.remove('open'); }
closeDrawer.addEventListener('click', closeDrawerFn);
drawerOverlay.addEventListener('click', closeDrawerFn);

clearMemoryBtn.addEventListener('click', () => {
  if(!confirm('Clear everything Myraa remembers about you? This cannot be undone.')) return;
  memories = [];
  saveMemories();
  renderMemoryDrawer();
});

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let listening = false;

if(SR){
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => { listening = true; micBtn.classList.add('active'); setOrbState('hearing'); };
  recognition.onend = () => { listening = false; micBtn.classList.remove('active'); if(orb.classList.contains('hearing')) setOrbState('idle'); };
  recognition.onerror = () => { listening = false; micBtn.classList.remove('active'); setOrbState('idle'); };
  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    addBubble(transcript, 'me');
    getReply(transcript);
  };

  micBtn.addEventListener('click', () => {
    if(listening){ recognition.stop(); }
    else{ try{ recognition.start(); }catch(e){} }
  });
}else{
  micBtn.disabled = true;
  micBtn.title = 'Voice input not supported in this browser';
}

window.addEventListener('load', () => {
  renderMemoryDrawer();
  if(history.length > 0){
    history.forEach(m => addBubble(m.content, m.role === 'user' ? 'me' : 'her'));
  }else{
    setTimeout(() => {
      const greeting = "Hi, I'm here. What's on your mind today?";
      history.push({role:'assistant', content: greeting});
      saveHistory();
      addBubble(greeting, 'her');
    }, 400);
  }
});
</script>
</body>
</html>
